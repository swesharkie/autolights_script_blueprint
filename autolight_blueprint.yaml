                                        {% set device =
                                        device_id(repeat.item.entity) %}

                                        {{ 'true' if device_attr((device),
                                        'manufacturer') == 'IKEA' else 'false'
                                        }}
                                  then:
                                    - alias: >-
                                        Two-Shot Sequence to handle some lights,
                                        ex. IKEA
                                      sequence:
                                        - action: light.turn_on
                                          metadata: {}
                                          data:
                                            color_temp_kelvin: "{{ repeat.item.temp }}"
                                          target:
                                            entity_id: "{{ repeat.item.entity }}"
                                        - action: light.turn_on
                                          metadata: {}
                                          data:
                                            transition: "{{ transition }}"
                                            brightness: "{{ repeat.item.brightness }}"
                                          target:
                                            entity_id: "{{ repeat.item.entity }}"
                                  else:
                                    - action: light.turn_on
                                      metadata: {}
                                      data:
                                        transition: "{{ transition }}"
                                        brightness: "{{ repeat.item.brightness }}"
                                        color_temp_kelvin: "{{ repeat.item.temp }}"
                                      target:
                                        entity_id: "{{ repeat.item.entity }}"
                              alias: Temperature
                      alias: Brightness and Color or Temperature
                    - conditions:
                        - condition: and
                          conditions:
                            - condition: template
                              value_template: |-
                                {% if (repeat.item.brightness) != 'none' %}
                                  true
                                {% else %}
                                  false
                                {% endif %}
                            - condition: template
                              value_template: >-
                                {% if state_attr(repeat.item.entity,
                                'brightness') != (repeat.item.brightness) %}
                                  true
                                {% else %}
                                  false
                                {% endif %}
                      sequence:
                        - action: light.turn_on
                          metadata: {}
                          data:
                            transition: "{{ transition }}"
                            brightness: "{{ repeat.item.brightness }}"
                          target:
                            entity_id: "{{ repeat.item.entity }}"
                      alias: Only brightness
                    - conditions:
                        - condition: and
                          conditions:
                            - condition: template
                              value_template: >-
                                {% if (repeat.item.theme) == 'none' and
                                (repeat.item.scene_method) != 'none' %}
                                  true
                                {% else %}
                                  false
                                {% endif %}
                            - condition: or
                              conditions:
                                - condition: template
                                  value_template: >-
                                    {% if state_attr(repeat.item.entity,
                                    'brightness') != (repeat.item.brightness) %}
                                      true
                                    {% else %}
                                      false
                                    {% endif %}
                                - condition: template
                                  value_template: >-
                                    {% if state_attr(repeat.item.entity,
                                    'rgb_color') != (repeat.item.rgb_color) %}
                                      true
                                    {% else %}
                                      false
                                    {% endif %}
                                - condition: template
                                  value_template: >-
                                    {% if (repeat.item.scene_method) == 'select'
                                    and states(repeat.item.scene_data) !=
                                    (repeat.item.scene) %}
                                      true
                                    {% else %}
                                      false
                                    {% endif %}
                      sequence:
                        - alias: Apply scene
                          choose:
                            - conditions:
                                - condition: template
                                  value_template: >-
                                    {% if (repeat.item.scene_method) ==
                                    'scene_action' %}
                                      true
                                    {% else %}
                                      false
                                    {% endif %}
                              sequence:
                                - action: scene.turn_on
                                  data:
                                    transition: "{{ transition }}"
                                  target:
                                    entity_id: "{{ repeat.item.scene }}"
                              alias: "Scene Method: Scene_Action"
                            - conditions:
                                - condition: template
                                  value_template: >-
                                    {% if (repeat.item.scene_method) == 'select'
                                    %}
                                      true
                                    {% else %}
                                      false
                                    {% endif %}
                              sequence:
                                - action: select.select_option
                                  metadata: {}
                                  data:
                                    option: "{{ repeat.item.scene }}"
                                  target:
                                    entity_id: "{{ repeat.item.scene_data }}"
                              alias: "Scene Method: Select"
                        - action: light.turn_on
                          metadata: {}
                          data:
                            transition: "{{ transition }}"
                            brightness: "{{ repeat.item.brightness }}"
                          target:
                            entity_id: "{{ repeat.item.entity }}"
                      alias: Brightness, color and scene
        alias: Detect Deviation
description: ""
mode: restart
