fields:
  scene_selection:
    name: Scene Selector
    description: "Select scene to run, required in all modes.\nIf Special Scene is not enabled, never select None!"
    required: true
    selector:
      select:
        options:
          - label: "Day"
            value: "daytime"
          - label: "Evening"
            value: "eveningtime"
          - label: "Night"
            value: "nighttime"
          - label: "Off"
            value: "off"
          - label: !input special_scene_name
            value: "special_scene"
    default: daytime
  detect_deviation:
    selector:
      boolean: {}
    default: false
    name: Detect Deviation
    description: Select to detect deviation from selected scene
    required: true
  specific_light:
    name: Select specific light(s) for scene or detect deviation. 
    description: "For deviation, this can be used in automation if light(s) change is set as trigger, trigger-entity_id variable can be leveraged to make runtime quicker.\nFor Scene it can be used to only affect specified light(s).\n"
    required: false
    selector:
      select:
        options:
          - !input light_1_entity
          - !input light_2_entity
          - !input light_3_entity
          - !input light_4_entity
          - !input light_5_entity
          - !input light_6_entity
          - !input light_7_entity
          - !input light_8_entity
          - !input light_9_entity
          - !input light_10_entity
        multiple: true
  exclude_light:
    name: Exclude specific light(s) for scene or detect deviation. 
    description: "This can be used if manual control of light is desired but settings remain in blueprint.\nOr for Scene it can be used to affect all light(s) except specified.\n"
    required: false
    selector:
      select:
        options:
          - !input light_1_entity
          - !input light_2_entity
          - !input light_3_entity
          - !input light_4_entity
          - !input light_5_entity
          - !input light_6_entity
          - !input light_7_entity
          - !input light_8_entity
          - !input light_9_entity
          - !input light_10_entity
        multiple: true
  transition_override:
    name: Light Transition Override
    description: "One time transition override.\nDefaults to blueprint set value\n"
    required: true
    default: !input transition
    selector:
      number:
        min: 0
        max: 3600

sequence:
  - alias: Set Global Variables
    variables:
      blueprint_transition: !input transition
      transition: >
        {% if (transition_override) is defined %}
          {{ transition_override | int }}
        {% else %}
          {{ blueprint_transition | int }}
        {% endif %}
      brightness_counter_light_sensor: "{{ states(light_sensor) | round(0, default=0) | int }}"
      light_1_entity: !input light_1_entity
      light_2_entity: !input light_2_entity
      light_3_entity: !input light_3_entity
      light_4_entity: !input light_4_entity
      light_5_entity: !input light_5_entity
      light_6_entity: !input light_6_entity
      light_7_entity: !input light_7_entity
      light_8_entity: !input light_8_entity
      light_9_entity: !input light_9_entity
      light_10_entity: !input light_10_entity
  - alias: Set time-based variables
    choose:
      - conditions:
          - condition: template
            value_template: "{{ iif(scene_selection == 'daytime', true, false, false) }}"
        sequence:
          - variables:
              brightness_counter: >
                {% if (presence_override_daytime_enabled) %}
                  {{ (states(override_daytime) | round(0, default=0) | int) + (states(presence_override_daytime) | round(0, default=0) | int) + (brightness_counter_light_sensor | round(0, default=0) | int) }}
                {% else %}
                  {{ (states(override_daytime) | round(0, default=0) | int) + (brightness_counter_light_sensor | round(0, default=0) | int) }}
                {% endif %}
              light_1_scene_method: !input light_1_scene_method_daytime
              light_1_scene_data: !input light_1_scene_data_selector_daytime
              light_1_brightness: "{{ light_1_brightness_daytime | int | round(0, default=0) }}"
              light_1_rgb_color: !input light_1_rgb_color_daytime
              light_1_temp: !input light_1_temp_daytime
              light_1_theme: !input light_1_theme_daytime
              light_1_scene: !input light_1_scene_daytime
              light_2_scene_method: !input light_2_scene_method_daytime
              light_2_scene_data: !input light_2_scene_data_selector_daytime
              light_2_brightness: "{{ light_2_brightness_daytime | int | round(0, default=0) }}"
              light_2_rgb_color: !input light_2_rgb_color_daytime
              light_2_temp: !input light_2_temp_daytime
              light_2_theme: !input light_2_theme_daytime
              light_2_scene: !input light_2_scene_daytime
              light_3_scene_method: !input light_3_scene_method_daytime
              light_3_scene_data: !input light_3_scene_data_selector_daytime
              light_3_brightness: "{{ light_3_brightness_daytime | int | round(0, default=0) }}"
              light_3_rgb_color: !input light_3_rgb_color_daytime
              light_3_temp: !input light_3_temp_daytime
              light_3_theme: !input light_3_theme_daytime
              light_3_scene: !input light_3_scene_daytime
              light_4_scene_method: !input light_4_scene_method_daytime
              light_4_scene_data: !input light_4_scene_data_selector_daytime
              light_4_brightness: "{{ light_4_brightness_daytime | int | round(0, default=0) }}"
              light_4_rgb_color: !input light_4_rgb_color_daytime
              light_4_temp: !input light_4_temp_daytime
