blueprint:
  name: Set lights Script
  description: Set designated lights to specificed setting
  domain: script
  input:
    Global:
      name: Global settings for light brightness overrides
      description: "Select entities for overrides to light-level.\nPlease create input_number entities first.\n"
      collapsed: false
      input:
        light_sensor:
          name: Light Sensor
          description: "Select the input_number driven by the rooms light sensor.\n"
          default: 'none'
          selector:
            entity:
              filter:
                - domain: input_number
              multiple: false
        override_daytime:
          name: Daytime Override
          description: "Select the input_number that controls brightness override for daytime.\n"
          default: 'none'
          selector:
            entity:
              filter:
                - domain: input_number
              multiple: false
        override_eveningtime:
          name: Eveningtime Override
          description: "Select the input_number that controls brightness override for eveningtime.\n"
          default: 'none'
          selector:
            entity:
              filter:
                - domain: input_number
              multiple: false
        override_nighttime:
          name: Nighttime Override
          description: "Select the input_number that controls brightness override for nighttime.\n"
          default: 'none'
          selector:
            entity:
              filter:
                - domain: input_number
              multiple: false
        transition:
          name: Light Transition
          description: "Input the time for transition in seconds.\n"
          default: 2
          selector:
            number:
              min: 0
              max: 3600
        presence_daytime_enable:
          name: Presence Override Day
          description: "Enable Presence override config for day.\n"
          default: false
          selector:
            boolean:
        override_presence_daytime:
          name: Presence Override Day
          description: "Select the input_number that controls brightness override for presence during Day.\n"
          default: ''
          selector:
            entity:
              filter:
                - domain: input_number
              multiple: false
        presence_eveningtime_enable:
          name: Presence Override Evening
          description: "Enable Presence override config for evening.\n"
          default: false
          selector:
            boolean:
        override_presence_eveningtime:
          name: Presence Override Evening
          description: "Select the input_number that controls brightness override for presence during Evening.\n"
          default: ''
          selector:
            entity:
              filter:
                - domain: input_number
              multiple: false
        presence_nighttime_enable:
          name: Presence Override Night
          description: "Enable Presence override config for night.\n"
          default: false
          selector:
            boolean:
        override_presence_nighttime:
          name: Presence Override Night
          description: "Select the input_number that controls brightness override for presence during Night.\n"
          default: ''
          selector:
            entity:
              filter:
                - domain: input_number
              multiple: false
        special_scene:
          name: Enable config of Special Scene
          description: "If you require an additional scene besides day, evening and night then enable this setting.\n"
          default: false
          selector:
            boolean:
        override_special_scene:
          name: Special Scene Override
          description: "Select the input_number that controls brightness override for Special Scene, if selected.\n"
          default: 'none'
          selector:
            entity:
              filter:
                - domain: input_number
              multiple: false
        presence_special_scene_enable:
          name: Presence Override Special Scene
          description: "Enable Presence override config for special scene.\n"
          default: false
          selector:
            boolean:
        override_presence_special_scene:
          name: Presence Override Special Scene
          description: "Select the input_number that controls brightness override for presence during Special Scene, if selected.\n"
          default: ''
          selector:
            entity:
              filter:
                - domain: input_number
              multiple: false
        special_scene_name:
          name: Name of Special Scene
          description: "If you enabled Special Scene, give it a name that will be selectable when script runs.\n"
          default: "None"
          selector:
            text:
    Light_1:
      name: Settings for light 1
      description: "Fill in the fields below to set the configuration for light 1.\n"
      collapsed: true
      input:
        light_1_entity:
          name: Light
          description: "Select the entity of light 1.\n"
          default: 'none'
          selector:
            entity:
              filter:
                - domain: light
              multiple: false
        light_1_delimiter_for_hass_stupidity_daytime:
          name: ---Daytime---
          description: "I'm just a delimiter in an attempt to make config a little more user-friendly.\n"
          default: "----------------Daytime----------------"
          selector:
            select:
              options:
                - "----------------Daytime----------------"
        light_1_brightness_daytime:
          name: Daytime brightness for light
          description: "Input the lightlevel, between 0 (off) and 255 (full).\n"
          default: 0
          selector:
            number:
              min: 0
              max: 255
        light_1_scene_method_daytime:
          name: Daytime Scene method for light
          description: "Select how scenes are applied to the light, if any scene is required.\n"
          default: 'none'
          selector:
            select:
              options:
                - label: None
                  value: none
                - label: Selector
                  value: selector
                - label: Scene
                  value: scene_action
        light_1_scene_data_selector_daytime:
          name: Daytime Scene data
          description: "Select selector if scene method is selector, otherwhise leave blank.\n"
          default: 'none'
          selector:
            entity:
              filter:
                domain: select
              multiple: false
        light_1_scene_daytime:
          name: Daytime Scene
          description: "Input scene entity_id if scene method is scene, or the selector option to select.\nIf no scene is required, leave as none\n"
          default: 'none'
          selector:
            text:
        light_1_theme_daytime:
          name: Daytime Light Scene
          description: "If light has built in scene instead of selector or scene apply. Input it here.\n"
          default: 'none'
          selector:
            text:
        light_1_rgb_color_daytime:
          name: Daytime Light Color
          description: "Set light color, leave blank if it interferes with scene.\nInput as rgb color.\n"
          default: 'none'
          selector:
            color_rgb:
        light_1_temp_daytime:
          name: Daytime Light Temperature
          description: "Set light temperature, if prefered over color.\nSame light can have color at one time a day and temperature another but not both at the same time.\n"
          default: 'none'
          selector:
            color_temp:
              unit: kelvin
              min: 2202
              max: 4000
        light_1_delimiter_for_hass_stupidity_eveningtime:
